<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: #f4f6f8; color: #212121; }

header {
  background: #1a237e; color: white;
  padding: 14px 16px;
}
header h1 { margin: 0; font-size: 17px; font-weight: 700; }
header p { margin: 3px 0 0; font-size: 11px; opacity: 0.75; }

.controls {
  background: white; padding: 10px 12px;
  border-bottom: 1px solid #ddd;
  position: sticky; top: 0; z-index: 20;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
}
.search-row { display: flex; gap: 8px; margin-bottom: 8px; }
#search-input {
  flex: 1; padding: 9px 12px;
  border: 1px solid #bbb; border-radius: 6px;
  font-size: 15px; outline: none;
}
#search-input:focus { border-color: #1a237e; }
#clear-btn {
  padding: 0 14px; border: 1px solid #bbb; border-radius: 6px;
  background: white; cursor: pointer; font-size: 18px; color: #666;
}

.filter-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
.filter-row::-webkit-scrollbar { display: none; }
.filter-btn {
  padding: 5px 14px; border: 1.5px solid #ccc; border-radius: 20px;
  background: white; cursor: pointer; font-size: 12px;
  white-space: nowrap; color: #444; flex-shrink: 0;
  transition: all .15s;
}
.filter-btn:active { opacity: .7; }
.filter-btn.active { background: #1a237e; color: white; border-color: #1a237e; }

.stats-bar {
  padding: 6px 14px; font-size: 12px; color: #777;
  background: #fafafa; border-bottom: 1px solid #eee;
  display: flex; justify-content: space-between; align-items: center;
}
.stats-bar a { color: #1a237e; font-size: 11px; text-decoration: none; }

.sort-row { display: flex; gap: 8px; align-items: center; padding: 6px 12px; background: #fafafa; border-bottom: 1px solid #eee; }
.sort-row label { font-size: 12px; color: #666; }
#sort-select { padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 560px; }
thead th {
  background: #e8eaf6; border-bottom: 2px solid #9fa8da;
  padding: 8px 10px; text-align: left; white-space: nowrap;
  font-size: 12px; color: #283593;
}
tbody tr { border-bottom: 1px solid #eee; cursor: pointer; transition: background .1s; }
tbody tr:hover { background: #f0f4ff; }
tbody tr.discontinued { opacity: .55; }
td { padding: 9px 10px; vertical-align: middle; }

.badge {
  display: inline-block; padding: 2px 7px;
  border-radius: 12px; font-size: 11px; font-weight: 600; white-space: nowrap;
}
.cat-加熱式たばこ { background: #e3f2fd; color: #0d47a1; }
.cat-葉巻たばこ   { background: #fce4ec; color: #880e4f; }
.cat-紙巻たばこ   { background: #e8f5e9; color: #1b5e20; }

.price-cell { text-align: right; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
.discontinued-mark { font-size: 10px; color: #e53935; margin-left: 4px; }

.name-cell small { display: block; color: #888; font-size: 11px; }
.pdf-link {

  border: 1px solid #9fa8da; border-radius: 4px;
  padding: 1px 5px; margin-left: 5px; text-decoration: none;
  vertical-align: middle; white-space: nowrap;
}
.pdf-link:active { background: #e8eaf6; }
.history-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #9fa8da; margin-left: 4px; vertical-align: middle; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.45); z-index: 100;
  align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white; border-radius: 14px 14px 0 0;
  padding: 20px 18px 32px; width: 100%; max-width: 520px;

@keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }

.modal-meta { font-size: 12px; color: #666; margin-bottom: 14px; display: flex; flex-wrap: wrap; gap: 8px; }
.modal-meta span { background: #f0f0f0; padding: 2px 8px; border-radius: 10px; }

.history-label { font-size: 12px; font-weight: 600; color: #1a237e; margin-bottom: 6px; }

@media (min-width: 600px) {
  .modal-overlay { align-items: center; }

.form-group input[type="email"] {

.form-group input[type="email"]:focus { border-color: #1a237e; }

.submit-btn {

.submit-btn:hover { opacity: .88; }
.submit-btn:disabled { opacity: .5; cursor: not-allowed; }

.notify-success { text-align: center; padding: 24px 0 8px; }

.unsubscribe-notice {

  padding: 14px 16px; margin: 16px; font-size: 13px; color: #e65100;
  text-align: center;
}

<div class="controls">

    <button class="filter-btn" data-cat="葉巻たばこ">葉巻</button>
    <button class="filter-btn" data-cat="紙巻たばこ">紙巻</button>

<div class="stats-bar">

<div class="table-wrap">

      <tr>

</div>

<!-- 通知登録モーダル -->
<div class="modal-overlay" id="notify-overlay">
  <div class="modal notify-modal">
    <div id="notify-unsub-notice" style="display:none" class="unsubscribe-notice">
      配信停止処理中...

          <h2>価格更新通知の登録</h2>

          <label>カテゴリ <span style="color:#888;font-weight:normal">（未選択 = 全カテゴリ）</span></label>
          <div class="checkbox-grid" id="cat-checkboxes">
            <label><input type="checkbox" value="加熱式たばこ">加熱式</label>

          <div class="checkbox-grid" id="country-checkboxes">
            <label><input type="checkbox" value="ニカラグア">ニカラグア</label>

            <label><input type="checkbox" value="ロシア">ロシア</label>
            <label><input type="checkbox" value="キューバ">キューバ</label>
            <label><input type="checkbox" value="アメリカ合衆国">アメリカ</label>

            <label><input type="checkbox" value="ホンジュラス">ホンジュラス</label>
            <label><input type="checkbox" value="ヨルダン">ヨルダン</label>
            <label><input type="checkbox" value="ドイツ">ドイツ</label>
            <label><input type="checkbox" value="日本">日本</label>
            <label><input type="checkbox" value="大韓民国">韓国</label>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" id="modal-close">×</button>
    </div>
    <div class="modal-meta" id="modal-meta"></div>
    <div class="history-label">価格履歴</div>
    <ul class="history-list" id="modal-history"></ul>
  </div>
</div>

<script>
const MOF_PDF_BASE = 'https://www.mof.go.jp/policy/tab_salt/topics/';
let allProducts = [];
let filtered = [];
let currentCat = '';
let currentSubcat = '';
let currentDiscontinued = false;
let currentSort = 'name';
let searchQuery = '';

// === パイプたばこ シーシャ/西洋パイプ 分類ロジック ===

// 製造国: シーシャほぼ確定
const SHISHA_COUNTRIES  = ['アラブ首長国連邦', 'ヨルダン', 'トルコ', 'エジプト', 'ロシア', 'インド', 'レバノン', 'サウジ'];
// 製造国: 西洋パイプほぼ確定 (ドイツは JBR 等のシーシャブランドもあるが、ブランドチェックを先行させる)
const WESTERN_COUNTRIES = ['デンマーク', 'イギリス', '英国', 'アイルランド', 'ベルギー', 'オランダ', 'スイス', 'スウェーデン', 'ドイツ'];

// シーシャブランド確定リスト (ブランドチェックを製造国より優先)
// ドイツ製 JBR 等を正しく判定するために先行チェック
const SHISHA_BRANDS = [
  // 確認済みブランド (英字)
  'AL FAKHER','ALFAKHER','DOZAJ','DARKSIDE','DARK SIDE','AFZAL',
  'FUMARI','AZURE','TRIFECTA','SOCIAL SMOKE','STARBUZZ','STAR BUZZ',
  'SERBETLI','DEBAJ','NAKHLA','AL WAHA','BUTA','MALAKI','LIRRA',
  'TANGIERS','HAZE','ODUMAN','REVOSHI','SEBERO','ELEMENT','MUSTHAVE',
  'ZODIAC','JIBAR','JIBIAR','LAVOO','CHAOS','DUFT','ARGELINI',
  'SHISHA KARTEL','ADALYA','MUST HAVE','CONSUME','BLUE MIST',
  'TWO APPLE','WHITE FOX','CHABACCO','PARADISE','KRAKEN',
  'MAZAYA','HOOKAFINA','TOKYO SHISHA','JBR',   // 追加: 確認済み
  'ROYAL SMOKIN','ROYAL SMOKIN',
  // カナ表記
  'アルファーヘル','ドザジ','ダークサイド','アフザル','フマリ',
  'スターバズ','セルベトリ','デバジ','ナハラ','アルワハ','マラキ','リラ',
  'ロイヤルスモーキン',
];

// 西洋パイプ判定キーワード
const PIPE_KW = [
  'MIXTURE','BLEND','FLAKE','CUT','CAVENDISH','LATAKIA','NAVY',
  'VIRGINIA','BURLEY','ORIENTAL','ENGLISH','SCOTTISH','AROMATIC',
  'シャグ','フレイク','ミクスチャー','ブレンド','オリエント','バージニア',
];

// シーシャ判定キーワード (ブランドリスト・製造国で確定できない場合の補完)
const SHISHA_KW = [
  'HOOKAH','MOLASSES','FLAVORED',
  'ICE','MOJITO','FIZZ',
];

function getPipeSubcat(p) {
  if (p.category !== 'パイプたばこ') return null;

  const country = p.country || '';
  const nameUp = (p.name + ' ' + (p.product_type || '')).toUpperCase();

  // Step 1: ブランド名で先に確定 (製造国より優先)
  // 理由: ドイツ製 JBR のようにブランドがシーシャでも国が西洋系の場合に対応
  if (SHISHA_BRANDS.some(b => nameUp.includes(b.toUpperCase()))) return 'シーシャ';

  // Step 2: 製造国で確定
  if (SHISHA_COUNTRIES.some(c => country.includes(c))) return 'シーシャ';
  if (WESTERN_COUNTRIES.some(c => country.includes(c))) return '西洋パイプ';

  // Step 3: キーワード判定 (USA, ラオス, 日本等の残余)
  if (PIPE_KW.some(k => nameUp.includes(k))) return '西洋パイプ';
  if (SHISHA_KW.some(k => nameUp.includes(k))) return 'シーシャ';

  return '西洋パイプ'; // デフォルト
}

async function loadData() {
  try {
    const res = await fetch('tobacco-prices/data/prices.json');
    if (!res.ok) throw new Error('データの読み込みに失敗しました');
    const data = await res.json();
    allProducts = data.products || [];
    document.querySelector('.stats-bar span').textContent;
    // Show updated_at
    if (data.updated_at) {
      document.querySelector('header p').textContent =
        `財務省「製造たばこの小売定価の認可」データをもとに作成 (最終更新: ${data.updated_at})`;
    }
    applyFilters();
  } catch (e) {
    document.getElementById('result-count').textContent = 'データを読み込めませんでした';
    console.error(e);
  }
}

function applyFilters() {
  const q = searchQuery.toLowerCase();
  filtered = allProducts.filter(p => {
    if (currentSubcat) {
      if (p.category !== 'パイプたばこ') return false;
      if (getPipeSubcat(p) !== currentSubcat) return false;
    } else if (currentCat && p.category !== currentCat) return false;
    if (currentDiscontinued && !p.discontinued) return false;
    if (!currentDiscontinued && p.discontinued && currentCat === '' && currentSubcat === '' && q === '') return false;
    if (q && !p.name.toLowerCase().includes(q) && !p.country.toLowerCase().includes(q) && !p.product_type.toLowerCase().includes(q)) return false;
    return true;
  });
  sortProducts();
  renderTable();
}

function sortProducts() {
  filtered.sort((a, b) => {
    switch (currentSort) {
      case 'price_asc':  return a.current_price - b.current_price;
      case 'price_desc': return b.current_price - a.current_price;
      case 'date_desc':  return (b.last_changed || '').localeCompare(a.last_changed || '');
      case 'date_asc':   return (a.last_changed || '').localeCompare(b.last_changed || '');
      case 'category':   return a.category.localeCompare(b.category) || a.name.localeCompare(b.name);
      default:           return a.name.localeCompare(b.name);
    }
  });
}

function catClass(p) {
  if (p.category === 'パイプたばこ') return 'cat-' + (getPipeSubcat(p) || 'パイプたばこ');
  return 'cat-' + p.category;
}

function displayCat(p) {
  if (p.category === 'パイプたばこ') return getPipeSubcat(p) || 'パイプ';
  return shortCat(p.category);
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  const empty = document.getElementById('empty-state');
  const count = document.getElementById('result-count');

  const total = allProducts.filter(p => !p.discontinued).length;
  const disc = allProducts.filter(p => p.discontinued).length;

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = '';
    count.textContent = `0件 (全${total}件 / 廃盤${disc}件)`;
    return;
  }
  empty.style.display = 'none';
  count.textContent = `${filtered.length}件表示 (全${total}件 / 廃盤${disc}件)`;

  tbody.innerHTML = filtered.map((p, i) => {
    const hasManyHistory = p.price_history && p.price_history.length > 1;
    const pdfFile = p.price_history && p.price_history[0] && p.price_history[0].pdf;
    const pdfLink = pdfFile
      ? `<a class="pdf-link" href="${MOF_PDF_BASE}${encodeURIComponent(pdfFile)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">PDF ↗</a>`
      : '';
    return `<tr data-idx="${i}" class="${p.discontinued ? 'discontinued' : ''}">
      <td><span class="badge ${catClass(p)}">${displayCat(p)}</span></td>
      <td class="name-cell">
        ${escHtml(p.name)}${p.discontinued ? '<span class="discontinued-mark">廃盤</span>' : ''}${pdfLink}
        <small>${escHtml(p.product_type)}</small>
      </td>
      <td>${escHtml(p.country)}</td>
      <td class="price-cell">¥${p.current_price.toLocaleString()}${hasManyHistory ? '<span class="history-dot" title="価格変更履歴あり"></span>' : ''}</td>
      <td style="white-space:nowrap;font-size:12px;color:#666">${p.last_changed || ''}</td>
    </tr>`;
  }).join('');

  tbody.querySelectorAll('tr').forEach(tr => {
    tr.addEventListener('click', () => openModal(filtered[+tr.dataset.idx]));
  });
}

function shortCat(cat) {
  return cat.replace('たばこ', '').trim() || cat;
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openModal(p) {
  document.getElementById('modal-title').textContent = p.name + (p.discontinued ? '（廃盤）' : '');
  const catLabel = p.category === 'パイプたばこ'
    ? `${p.category}（${getPipeSubcat(p)}）`
    : p.category;
  document.getElementById('modal-meta').innerHTML =
    `<span>${escHtml(catLabel)}</span><span>${escHtml(p.product_type)}</span><span>${escHtml(p.country)}</span>`;

  const history = (p.price_history || []).slice().sort((a,b) => (b.date||'').localeCompare(a.date||''));
  document.getElementById('modal-history').innerHTML = history.map((h, i) => {
    const isCurrent = i === 0;
    const pdfLink = h.pdf ? `<span class="h-pdf"><a href="${MOF_PDF_BASE}${encodeURIComponent(h.pdf)}" target="_blank" rel="noopener">PDF ↗</a></span>` : '';
    return `<li>
      <span class="h-date">${h.date || '不明'}</span>
      <span class="h-price ${isCurrent ? 'current' : ''}">¥${Number(h.price).toLocaleString()}</span>
      ${pdfLink}
    </li>`;
  }).join('');

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  gtag('event', 'view_item', { item_name: p.name, item_category: p.category, price: p.current_price });
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// Event listeners
let _searchTimer;
document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  applyFilters();
  // 1秒間入力が止まったらGA4に送信（2文字以上）
  clearTimeout(_searchTimer);
  if (searchQuery.length >= 2) {
    _searchTimer = setTimeout(() => {
      gtag('event', 'search', { search_term: searchQuery });
    }, 1000);
  }
});
document.getElementById('clear-btn').addEventListener('click', () => {
  document.getElementById('search-input').value = '';
  searchQuery = '';
  applyFilters();
});
document.getElementById('sort-select').addEventListener('change', e => {
  currentSort = e.target.value;
  sortProducts();
  renderTable();
});
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (btn.dataset.discontinued) {
      currentDiscontinued = true;
      currentCat = '';
      currentSubcat = '';
      gtag('event', 'filter_category', { filter_name: '廃盤のみ' });
    } else if (btn.dataset.subcat) {
      currentDiscontinued = false;
      currentCat = '';
      currentSubcat = btn.dataset.subcat;
      gtag('event', 'filter_category', { filter_name: btn.dataset.subcat });
    } else {
      currentDiscontinued = false;
      currentCat = btn.dataset.cat || '';
      currentSubcat = '';
      gtag('event', 'filter_category', { filter_name: btn.dataset.cat || 'すべて' });
    }
    applyFilters();
  });
});
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

loadData();

// ===== 通知登録 =====

const SUPABASE_URL  = 'https://vqzflvuiiertnsuonvny.supabase.co';
const SUPABASE_ANON = 'sb_publishable_iW4BqS-TYfGZsYmB732RuA_Q42zBOW3';

function getCheckedValues(containerId) {
  return Array.from(document.querySelectorAll(`#${containerId} input:checked`))
    .map(cb => cb.value);
}

async function registerSubscriber(email, categoryFilters, countryFilters, nameKeywords) {
  // register_subscriber RPC で登録（重複はサイレント処理）
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/register_subscriber`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_ANON,
      'Authorization': `Bearer ${SUPABASE_ANON}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({
      p_email:            email,
      p_category_filters: categoryFilters,
      p_country_filters:  countryFilters,
      p_name_keywords:    nameKeywords,
    }),
  });
  if (!res.ok) {
    throw new Error('登録に失敗しました。しばらくしてからお試しください');
  }
}

async function unsubscribeByToken(token) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/unsubscribe_by_token`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_ANON,
      'Authorization': `Bearer ${SUPABASE_ANON}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ p_token: token }),
  });
  return res.ok;
}

// URLパラメーター処理（本登録確認・配信停止）
(async () => {
  const params   = new URLSearchParams(location.search);
  const confirm  = params.get('confirm');
  const unsub    = params.get('unsubscribe');
  if (!confirm && !unsub) return;

  const overlay  = document.getElementById('notify-overlay');
  const notice   = document.getElementById('notify-unsub-notice');
  const formWrap = document.getElementById('notify-form-wrap');

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  formWrap.style.display = 'none';
  notice.style.display = '';

  if (confirm) {
    notice.textContent = '本登録処理中...';
    try {
      const res = await fetch(
        `${SUPABASE_URL}/functions/v1/confirm-subscriber`,
        {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON,
            'Authorization': `Bearer ${SUPABASE_ANON}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ token: confirm }),
        }
      );
      notice.textContent = res.ok
        ? '✅ 本登録が完了しました。価格更新時にメールをお送りします。'
        : '⚠️ 処理に失敗しました。リンクが無効または期限切れの可能性があります。';
    } catch {
      notice.textContent = '⚠️ 通信エラーが発生しました。';
    }
  } else if (unsub) {
    notice.textContent = '配信停止処理中...';
    const ok = await unsubscribeByToken(unsub);
    notice.textContent = ok
      ? '✅ 配信停止が完了しました。今後はメールをお送りしません。'
      : '⚠️ 配信停止処理に失敗しました。すでに削除済みの可能性があります。';
  }

  history.replaceState(null, '', location.pathname);
})();

});
document.getElementById('notify-close-btn').addEventListener('click', () => {

document.getElementById('notify-overlay').addEventListener('click', e => {

    document.getElementById('notify-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }
});

// フォーム送信
document.getElementById('notify-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn   = document.getElementById('notify-submit');
  const errEl = document.getElementById('notify-error');
  const email = document.getElementById('notify-email').value.trim();

  const categoryFilters = getCheckedValues('cat-checkboxes');
  const countryFilters  = getCheckedValues('country-checkboxes');
  const rawKeywords     = document.getElementById('notify-keywords').value;
  const nameKeywords    = rawKeywords.split(',').map(s => s.trim()).filter(Boolean);

  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = '登録中...';

  try {
    await registerSubscriber(email, categoryFilters, countryFilters, nameKeywords);
    document.getElementById('notify-form-wrap').style.display = 'none';
    document.getElementById('notify-success').style.display = '';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = '';
    btn.disabled = false;
    btn.textContent = '登録する';
  }
});
