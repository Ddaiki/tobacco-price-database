name: Update Tobacco Prices

on:
  schedule:
    # 毎週月曜日 9:00 JST (0:00 UTC)
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r tobacco-prices/scripts/requirements.txt

      - name: Run update script
        run: python tobacco-prices/scripts/update_prices.py

      - name: Send update notifications
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python tobacco-prices/scripts/notify_subscribers.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tobacco-prices/data/prices.json tobacco-prices/data/notify_baseline.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update tobacco prices ($(date -u +%Y-%m-%d))"
            git push
          fi
